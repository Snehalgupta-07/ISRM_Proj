<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Abstract Background Elements */
        .bg-shape { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.6; z-index: 0; }
        .bg-shape-1 { top: -100px; left: -100px; width: 400px; height: 400px; background: #6366f1; }
        .bg-shape-2 { bottom: -150px; right: -50px; width: 500px; height: 500px; background: #06b6d4; }

        .login-wrapper {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .login-title {
            font-family: 'Sora', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        
        .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }
        .form-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Sora', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }

        .demo-creds {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .demo-creds h4 { color: rgba(255, 255, 255, 0.9); margin-bottom: 12px; font-weight: 600; }
        .demo-creds p { margin-bottom: 6px; }
        .demo-creds code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; color: #818cf8; font-family: monospace;}

        /* Toast Notifications */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast {
            background: #1e293b; border-radius: 12px; padding: 16px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 12px; min-width: 300px; transform: translateX(120%); opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); position: relative; overflow: hidden; border-left: 4px solid #6366f1;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-icon { font-size: 20px; }
        .toast-content { flex: 1; }
        .toast-title { font-size: 14px; font-weight: 700; color: #f8fafc; margin-bottom: 2px; }
        .toast-message { font-size: 13px; color: #cbd5e1; line-height: 1.4; }
        .toast-close { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 16px; padding: 4px; }
        .toast.danger { border-left-color: #ef4444; } .toast.danger .toast-icon { color: #ef4444; }
        .toast.success { border-left-color: #10b981; } .toast.success .toast-icon { color: #10b981; }
        .toast.warning { border-left-color: #f59e0b; } .toast.warning .toast-icon { color: #f59e0b; }
        .toast-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: rgba(255,255,255,0.1); width: 100%; }
        .toast-progress-bar { height: 100%; background: #6366f1; width: 100%; transition: width linear; }
        .toast.danger .toast-progress-bar { background: #ef4444; } .toast.success .toast-progress-bar { background: #10b981; }
        .toast.warning .toast-progress-bar { background: #f59e0b; }
    </style>
</head>
<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="login-wrapper">
        <div class="login-header">
            <div class="brand-icon">🎓</div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Student Management Portal</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="demo-creds">
            <h4>Demo Credentials</h4>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <div>Admin: <code>admin</code> / <code>admin123</code></div>
                <div>User: <code>user</code> / <code>password</code></div>
            </div>
            <div>Student: <code>john_student</code> / <code>student123</code></div>
        </div>
    </div>

    <script>
        function showToast(category, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${category}`;
            let icon = 'ℹ️', title = 'Information';
            if (category === 'success') { icon = '✅'; title = 'Success'; }
            if (category === 'danger') { icon = '❌'; title = 'Error'; }
            if (category === 'warning') { icon = '⚠️'; title = 'Warning'; }
            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div>
                <button class="toast-close" onclick="this.parentElement.remove()">×</button>
                <div class="toast-progress"><div class="toast-progress-bar"></div></div>
            `;
            container.appendChild(toast);
            toast.offsetHeight; toast.classList.add('show');
            const pb = toast.querySelector('.toast-progress-bar');
            pb.style.transitionDuration = '5s'; pb.style.width = '0%';
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 5000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            {% if error %}
                showToast('danger', '{{ error|replace("'", "\\'") }}');
            {% endif %}
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        showToast('{{ category }}', '{{ message|replace("'", "\\'")|replace("\n", " ") }}');
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });
    </script>
</body>
</html>
