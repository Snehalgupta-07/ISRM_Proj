{% extends "base.html" %}

{% block title %}Add Student - ISRM System{% endblock %}
{% block page_title %}Add New Student{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="card-header">
        <div class="card-title">Student Details Form</div>
    </div>

    <form method="POST" action="{{ url_for('add_student') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="roll_no">Roll Number</label>
                <input type="text" id="roll_no" name="roll_no" placeholder="e.g., 20001" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="e.g., John Doe" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="e.g., john@university.edu" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="e.g., 9876543210" required>
            </div>

            <div class="form-group full">
                <label class="form-label" for="address">Address</label>
                <textarea id="address" name="address" placeholder="Enter complete address" required style="min-height: 80px;"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="ssn">SSN / ID Number</label>
                <input type="text" id="ssn" name="ssn" placeholder="e.g., 123-45-6789" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="gpa">GPA</label>
                <input type="number" id="gpa" name="gpa" min="0" max="4" step="0.01" placeholder="e.g., 3.85" required>
            </div>
        </div>

        <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Student</button>
        </div>
    </form>
</div>
{% endblock %}
